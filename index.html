<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yash Singh · full‑stack developer</title>
    <!-- Font Awesome 6 (free) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <!-- Bootstrap css  -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <main id="page-load">
      <!-- video background with improved overlay -->
      <div class="video-container">
        <video autoplay muted loop id="bg-video">
          <!-- make sure homebg.mp4 is in the same folder, otherwise use a solid backup -->
          <source src="homebg.mp4" type="video/mp4" />
          <!-- if video missing, background stays elegant thanks to overlay + color -->
        </video>
        <div class="overlay"></div>
      </div>

      <!-- navigation refined -->
      <nav>
        <div class="logo">&lt; Yash Singh /&gt;</div>
        <ul>
          <li><a href="#" class="active">Home</a></li>
          <li><a href="About/about.html">About Me</a></li>
          <li><a href="coming soon/soon.html">Skills</a></li>
          <li><a href="Projects/project.html">Projects</a></li>
          <li><a href="coming soon/soon.html">Contact</a></li>
        </ul>
        <a href="coming soon/soon.html" style="text-decoration: none">
          <button type="button" id="btn" class="btn btn-outline-danger">
            LOG IN
          </button>
        </a>
      </nav>

      <!-- hero section with improved copy & illustration -->
      <section class="hero">
        <div class="content">
          <h3>👋 Hey!</h3>
          <h1>I'm <span>Yash Singh</span></h1>
          <h2>I'm a <b>Full Stack Developer</b></h2>
          <p>
            I architect and build pixel-perfect, scalable web applications. From
            database to UI — seamless, fast, accessible.
          </p>

          <div class="social-links">
            <a href="coming soon/soon.html" aria-label="GitHub"
              ><i class="fab fa-github"></i
            ></a>
            <a href="coming soon/soon.html" aria-label="LinkedIn"
              ><i class="fab fa-linkedin"></i
            ></a>
            <a href="coming soon/soon.html" aria-label="CodePen"
              ><i class="fas fa-code"></i
            ></a>
          </div>

          <button class="btn-resume">✨ View Resume</button>
        </div>

        <div class="hero-image">
          <!-- make sure img.png exists, or replace with any developer vector -->
          <img
            src="img.png"
            alt="Yash Singh – full stack developer illustration"
            onerror="
              this.src =
                'https://placehold.co/600x400/1a1a72/white?text=YASH+SINGH'
            "
          />
        </div>
      </section>
    </main>

    <!-- tiny script to ensure active class matches the current page (demo Home as active) -->
    <script>
      (function setActiveNav() {
        const navLinks = document.querySelectorAll("nav ul li a");
        const currentPath =
          window.location.pathname.split("/").pop() || "index.html"; // naive
        navLinks.forEach((link) => {
          // for demo we keep Home active, but you can enhance later
          if (link.textContent.trim() === "Home") {
            link.classList.add("active");
          } else {
            link.classList.remove("active");
          }
        });
      })();
    </script>
  </body>
</html>
