<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About Me — Yash · enhanced</title>
    <!-- Bootstrap 5 (only for button base, but we override heavily) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Font Awesome (optional icons for extra touch) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="about.css" />
  </head>
  <body>
    <section class="about-container">
      <!-- floating badge with animation + glass -->
      <div class="badge">
        <div class="icon-box">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="34"
            height="34"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#00d8ff"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="16 18 22 12 16 6"></polyline>
            <polyline points="8 6 2 12 8 18"></polyline>
          </svg>
        </div>
        <div class="badge-text">
          <span class="exp">5+</span>
          <span class="label">PROJECTS</span>
        </div>
      </div>

      <div class="content-wrapper">
        <!-- left text -->
        <div class="text-section">
          <p class="intro-text">let me introduce myself</p>
          <h1>ABOUT ME</h1>
          <p class="description">
            I am a freelance website designer and developer from Dharuhera,
            Haryana. I create professional websites. I love art and always try
            to show unique views to the audience through my design.
          </p>
          <div class="buttons">
            <a href="#" class="text-decoration-none"
              ><button type="button" class="btn btn-primary">
                <i class="fas fa-code-branch me-2"></i>Projects
              </button></a
            >
            <a href="#" class="text-decoration-none"
              ><button type="button" class="btn btn-secondary">
                <i class="fas fa-paper-plane me-2"></i>Hire
              </button></a
            >
            <a href="\index.html" class="text-decoration-none"
              ><button type="button" class="btn btn-success">
                <i class="fas fa-home me-2"></i>Home
              </button></a
            >
            <a href="#" class="text-decoration-none"
              ><button type="button" class="btn btn-danger">
                <i class="fas fa-cog me-2"></i>Skills
              </button></a
            >
          </div>
        </div>

        <!-- right images with overlapping effect -->
        <div class="image-section">
          <div class="image-box main-img">
            <!-- using unsplash placeholder with nice face/abstract (via placeholder? but we replace with unsplash image) -->
            <img
              src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=400&h=500&fit=crop&auto=format"
              alt="Yash profile main"
            />
          </div>
          <div class="image-box sub-img">
            <img
              src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=300&h=350&fit=crop&auto=format"
              alt="Yash secondary"
            />
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
