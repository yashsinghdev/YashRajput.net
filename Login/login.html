<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Login</title>
    <!-- Google Fonts + Font Awesome -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-container">
      <div class="brand">
        <div class="logo-icon">
          <i class="fas fa-bolt"></i>
        </div>
        <h1>Welcome back</h1>
        <p>Sign in to your secure workspace</p>
      </div>

      <form id="loginForm" action="#" method="POST">
        <div class="input-group">
          <i class="fas fa-envelope input-icon"></i>
          <input
            type="email"
            id="email"
            class="input-field"
            placeholder="Email address"
            autocomplete="email"
            required
          />
        </div>
        <div class="input-group">
          <i class="fas fa-lock input-icon"></i>
          <input
            type="password"
            id="password"
            class="input-field"
            placeholder="Password"
            autocomplete="current-password"
            required
          />
        </div>

        <div class="options-row">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe" /> <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link" id="forgotLink">Forgot password?</a>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <span class="btn-text"
            ><i
              class="fas fa-arrow-right-to-bracket"
              style="margin-right: 8px"
            ></i>
            Sign In</span
          >
        </button>
      </form>

      <div class="signup-prompt">
        Don't have an account?<a href="#" class="signup-link" id="signupLink">
          Create account</a
        >
      </div>
    </div>

    <div id="toastMessage" class="message-toast">
      <i class="fas fa-circle-check"></i>
      <span id="toastText">Demo message</span>
    </div>

    <script src="login.js"></script>
  </body>
</html>
