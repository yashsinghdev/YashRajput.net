<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Card Memory Game | Match Master</title>
    <!-- Bootstrap 5 CSS (only for dropdown and base styling) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="cardgame.css" />
    <!--Favicon-->
    <link rel="icon" type="image/x-icon" href="fevicon.png" />
  </head>
  <body>
    <!-- HTML STRUCTURE - exactly matching required classes and elements -->
    <div class="bord-contaner">
      <div class="Help-bord">
        <h3>Move Count: <span id="move-count">00</span></h3>
        <h3>Timer: <span id="timer">00:00</span></h3>
        <h3>Best Score: <span id="best-score">00</span></h3>
        <!-- Dropdown for level selection -->
        <div class="btn-group">
          <button
            type="button"
            class="btn btn-danger dropdown-toggle"
            data-bs-toggle="dropdown"
            aria-expanded="false"
            id="levelDropdownBtn"
          >
            Beginner(4x4)
          </button>
          <ul
            class="dropdown-menu"
            id="levelMenuList"
            style="max-height: 300px; overflow-y: auto"
          >
            <li class="dropdown-item">Noob(2x2)</li>
            <li class="dropdown-item">Beginner(4x4)</li>
            <li class="dropdown-item">Easy(6x6)</li>
            <li class="dropdown-item">Medium(8x8)</li>
            <li class="dropdown-item">Hard(10x10)</li>
            <li class="dropdown-item">Advanced(12x12)</li>
            <li class="dropdown-item">Expert(16x16)</li>
          </ul>
        </div>
        <button type="button" class="btn-success" id="startGameBtn">
          Start Game
        </button>
      </div>
    </div>
    <h1>Card Memory <span>Game</span></h1>
    <div class="gamebox" id="gamebox"></div>

    <!-- Bootstrap JS Bundle is required for dropdown functionality -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="card.js"></script>
  </body>
</html>
